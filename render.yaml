services:
  - type: web
    name: market-mind-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      # Comma-separated list of allowed frontend origins, e.g. https://your-app.vercel.app
      - key: CORS_ORIGINS
        sync: false
      # Optional - the AI Insights assistant falls back to a deterministic mock provider
      # if this is left unset.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash

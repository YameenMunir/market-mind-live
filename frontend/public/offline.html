<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>You're offline | Market Mind Live</title>
<style>
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #090b10;
    color: #e6e8ee;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  .card {
    max-width: 360px;
  }
  .mark {
    width: 40px;
    height: 40px;
    border-radius: 11px;
    background: #f5a623;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 16px;
    font-weight: 600;
    margin: 0 0 8px;
  }
  p {
    font-size: 13px;
    line-height: 1.6;
    color: #9aa1af;
    margin: 0 0 20px;
  }
  button {
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #090b10;
    background: #f5a623;
    border: none;
    border-radius: 6px;
    padding: 10px 18px;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="mark" aria-hidden="true">
      <svg width="22" height="22" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 17.5L10.5 12L14 15.5L20 8" stroke="#07090e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
        <circle cx="20" cy="8" r="2" fill="#07090e" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>Market Mind Live needs a connection for live quotes and charts. Reconnect and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
